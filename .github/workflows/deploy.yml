name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build + deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=crosspec --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure custom domains attached
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for domain in crosspec.com www.crosspec.com; do
            echo "::group::ensure $domain"
            status=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec/domains" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$domain\"}")
            if [ "$status" = "200" ]; then
              echo "$domain: attached"
            else
              if grep -q '"code":8000007' /tmp/resp.json 2>/dev/null || grep -q "already" /tmp/resp.json 2>/dev/null; then
                echo "$domain: already attached"
              else
                echo "$domain: status=$status"
                cat /tmp/resp.json
              fi
            fi
            echo "::endgroup::"
          done

      - name: Diagnose www domain status + DNS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "::group::Pages domain status: www.crosspec.com"
          curl -sS \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec/domains/www.crosspec.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | python3 -m json.tool || true
          echo "::endgroup::"

          echo "::group::Pages domain status: crosspec.com"
          curl -sS \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec/domains/crosspec.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | python3 -m json.tool || true
          echo "::endgroup::"

          echo "::group::Find zone id for crosspec.com"
          ZONE_JSON=$(curl -sS \
            "https://api.cloudflare.com/client/v4/zones?name=crosspec.com" \
            -H "Authorization: Bearer $CF_API_TOKEN")
          echo "$ZONE_JSON" | python3 -m json.tool | head -40 || echo "$ZONE_JSON"
          ZONE_ID=$(echo "$ZONE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')")
          echo "ZONE_ID=$ZONE_ID"
          echo "::endgroup::"

          if [ -n "$ZONE_ID" ]; then
            echo "::group::DNS records on zone (filtered to apex + www)"
            curl -sS \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?per_page=100" \
              -H "Authorization: Bearer $CF_API_TOKEN" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); [print(r['type'], r['name'], '->', r['content'], 'proxied=' + str(r.get('proxied',False)), 'id=' + r['id']) for r in d.get('result',[]) if r['name'] in ('crosspec.com','www.crosspec.com')]"
            echo "::endgroup::"
          fi
