name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build + deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync Pages production env vars
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 -c "
          import json, os, sys, urllib.request
          payload = {
            'deployment_configs': {
              'production': {
                'env_vars': {
                  'MERCHANT_TAG_AMAZON': {'type': 'plain_text', 'value': 'crosspec20-20'},
                  'GROQ_API_KEY': {'type': 'secret_text', 'value': os.environ['GROQ_API_KEY']},
                }
              }
            }
          }
          req = urllib.request.Request(
            f\"https://api.cloudflare.com/client/v4/accounts/{os.environ['CF_ACCOUNT_ID']}/pages/projects/crosspec\",
            method='PATCH',
            data=json.dumps(payload).encode(),
            headers={
              'Authorization': f\"Bearer {os.environ['CF_API_TOKEN']}\",
              'Content-Type': 'application/json',
            },
          )
          with urllib.request.urlopen(req) as r:
            d = json.loads(r.read())
          print('env-sync success:', d.get('success'))
          if not d.get('success'):
            print(json.dumps(d.get('errors', []), indent=2))
            sys.exit(1)
          "

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=crosspec --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: IndexNow ping (Bing/Yandex/Naver)
        run: |
          # Build URL list from sitemap. IndexNow accepts up to 10000 URLs/POST.
          curl -sS https://crosspec.com/sitemap.xml -o /tmp/sm.xml
          python3 - <<'PY' > /tmp/urls.json
          import re, json
          locs = re.findall(r"<loc>([^<]+)</loc>", open("/tmp/sm.xml").read())
          payload = {
            "host": "crosspec.com",
            "key": "dc441b7571f22f20c000cb6bffa66fbf",
            "keyLocation": "https://crosspec.com/dc441b7571f22f20c000cb6bffa66fbf.txt",
            "urlList": locs,
          }
          print(json.dumps(payload))
          PY
          for endpoint in https://api.indexnow.org/indexnow https://www.bing.com/indexnow https://yandex.com/indexnow; do
            echo "::group::POST $endpoint"
            curl -sS -X POST "$endpoint" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data @/tmp/urls.json -w "\nstatus=%{http_code}\n" || true
            echo "::endgroup::"
          done

      - name: Ensure custom domains attached
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for domain in crosspec.com www.crosspec.com; do
            echo "::group::ensure $domain"
            status=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec/domains" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$domain\"}")
            if [ "$status" = "200" ]; then
              echo "$domain: attached"
            else
              if grep -q '"code":8000007' /tmp/resp.json 2>/dev/null || grep -q "already" /tmp/resp.json 2>/dev/null; then
                echo "$domain: already attached"
              else
                echo "$domain: status=$status"
                cat /tmp/resp.json
              fi
            fi
            echo "::endgroup::"
          done

