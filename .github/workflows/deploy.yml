name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build + deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync Pages production env vars
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -sS -o /tmp/envresp.json -w "status=%{http_code}\n" \
            -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"deployment_configs":{"production":{"env_vars":{"MERCHANT_TAG_AMAZON":{"type":"plain_text","value":"crosspec20-20"}}}}}'
          python3 -c "import json; d=json.load(open('/tmp/envresp.json')); print('env-sync success:', d.get('success'))"

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=crosspec --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure custom domains attached
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for domain in crosspec.com www.crosspec.com; do
            echo "::group::ensure $domain"
            status=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/crosspec/domains" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$domain\"}")
            if [ "$status" = "200" ]; then
              echo "$domain: attached"
            else
              if grep -q '"code":8000007' /tmp/resp.json 2>/dev/null || grep -q "already" /tmp/resp.json 2>/dev/null; then
                echo "$domain: already attached"
              else
                echo "$domain: status=$status"
                cat /tmp/resp.json
              fi
            fi
            echo "::endgroup::"
          done

